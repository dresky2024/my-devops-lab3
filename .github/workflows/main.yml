name: Remote Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/my-devops-lab3
            git pull origin main
            sudo docker build -t my-custom-app .
            sudo docker rm -f my-running-app || true
            sudo docker run -d --name my-running-app -p 5000:5000 my-custom-app
            
